name: Build and Push Backend Ventas

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST
          dockerfile: ./Springboot-API-REST/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_REPO_BACKEND_VENTAS }}:latest
            ${{ secrets.DOCKER_HUB_REPO_BACKEND_VENTAS }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_REPO_BACKEND_VENTAS }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_REPO_BACKEND_VENTAS }}:buildcache,mode=max

      - name: Image pushed successfully
        run: echo "✅ Backend Ventas image pushed to Docker Hub as alishiin/back-ventas-springboot:latest"
